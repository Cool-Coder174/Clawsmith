models:
  local_router:
    provider: ollama          # litellm provider prefix
    model_name: ollama/mistral
    max_tokens: 1024
    temperature: 0.2
    input_cost_per_token: 0.0   # local model, no API cost
    output_cost_per_token: 0.0

  local_code:
    provider: ollama
    model_name: ollama/codellama
    max_tokens: 4096
    temperature: 0.1
    input_cost_per_token: 0.0   # local model, no API cost
    output_cost_per_token: 0.0

  premium:
    provider: openai
    model_name: openai/gpt-4o
    max_tokens: 8192
    temperature: 0.2
    input_cost_per_token: 0.0000025    # $2.50 per 1M input tokens
    output_cost_per_token: 0.00001     # $10.00 per 1M output tokens

  prompt_polisher:
    provider: openai
    model_name: openai/gpt-4o-mini
    max_tokens: 2048
    temperature: 0.3
    input_cost_per_token: 0.00000015   # $0.15 per 1M input tokens
    output_cost_per_token: 0.0000006   # $0.60 per 1M output tokens

routing:
  low_complexity_threshold: 0.35
  high_complexity_threshold: 0.70
  ambiguity_bump_threshold: 0.60

execution:
  default_timeout: 300        # seconds
  max_retries: 2
  artifacts_dir: artifacts    # relative to repo root
  logs_dir: logs              # relative to repo root
  allowed_commands:
    - cursor
    - python
    - pip
    - npm
    - npx
    - node
    - cargo
    - dotnet
    - git
    - pytest
    - ruff
    - mypy
    - eslint
    - tsc

mcp_server:
  host: 127.0.0.1
  port: 8765
  transport: sse

openclaw:
  skill_name: ClawSmith
  mcp_endpoint: "http://127.0.0.1:8765/sse"
  webhook_secret: ""   # set via env OPENCLAW_WEBHOOK_SECRET

agents:
  default_agent: null              # null = auto-select best available CLI
  fallback_order:
    - claude_code
    - cursor
    - gemini_cli
    - openclaw
  auto_detect: true                # scan for installed agent CLIs on startup
  default_approval_mode: null      # agent-specific approval/sandbox mode
  default_output_format: null      # 'json', 'text', or null for agent default
  show_experimental: false         # show adapters marked experimental in doctor output
  overrides: {}                    # per-agent overrides, e.g. cursor: {executable: "C:\\...\\cursor.exe"}
