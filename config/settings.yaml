models:
  local_router:
    provider: ollama          # litellm provider prefix
    model_name: ollama/mistral
    max_tokens: 1024
    temperature: 0.2
    input_cost_per_token: 0.0   # local model, no API cost
    output_cost_per_token: 0.0

  local_code:
    provider: ollama
    model_name: ollama/codellama
    max_tokens: 4096
    temperature: 0.1
    input_cost_per_token: 0.0   # local model, no API cost
    output_cost_per_token: 0.0

  premium:
    provider: ollama
    model_name: ollama/qwen2.5-coder:14b
    max_tokens: 8192
    temperature: 0.2
    input_cost_per_token: 0.0          # local model, no API cost
    output_cost_per_token: 0.0

  prompt_polisher:
    provider: ollama
    model_name: ollama/mistral
    max_tokens: 2048
    temperature: 0.3
    input_cost_per_token: 0.0          # local model, no API cost
    output_cost_per_token: 0.0

routing:
  low_complexity_threshold: 0.35
  high_complexity_threshold: 0.70
  ambiguity_bump_threshold: 0.60

execution:
  default_timeout: 300        # seconds
  max_retries: 2
  artifacts_dir: artifacts    # relative to repo root
  logs_dir: logs              # relative to repo root
  allowed_commands:
    - cursor
    - python
    - pip
    - npm
    - npx
    - node
    - cargo
    - dotnet
    - git
    - pytest
    - ruff
    - mypy
    - eslint
    - tsc

mcp_server:
  host: 127.0.0.1
  port: 8765
  transport: sse

openclaw:
  enabled: false              # master toggle — set true to activate OpenClaw integration
  skill_name: ClawSmith
  mcp_endpoint: "http://127.0.0.1:8765/sse"
  webhook_secret: ""          # set via env OPENCLAW_WEBHOOK_SECRET
  gateway_url: ""             # OpenClaw gateway URL, e.g. https://openclaw.example.com
  api_key: ""                 # set via env OPENCLAW_API_KEY
  callback_url: ""            # URL OpenClaw can reach to get status updates
  auto_register: false        # auto-register as skill on server start
  webhook_port: 8766          # port for the inbound webhook receiver
  webhook_host: "127.0.0.1"
  task_timeout: 600           # max seconds for a forwarded task
  share_api_keys: true        # let OpenClaw route completions through our API keys
  share_local_models: true    # let OpenClaw use our local Ollama models
  allow_skill_import: false   # allow importing skills from the OpenClaw gateway
  allow_external_execution: false          # allow executing OpenClaw-imported skills
  require_approval_for_external_writes: true  # require explicit approval before an external skill writes files

agents:
  default_agent: null              # null = auto-select best available CLI
  fallback_order:
    - claude_code
    - cursor
    - gemini_cli
    - openclaw
  auto_detect: true                # scan for installed agent CLIs on startup
  default_approval_mode: null      # agent-specific approval/sandbox mode
  default_output_format: null      # 'json', 'text', or null for agent default
  show_experimental: false         # show adapters marked experimental in doctor output
  overrides: {}                    # per-agent overrides, e.g. cursor: {executable: "C:\\...\\cursor.exe"}

discovery:
  cache_profile: true
  profile_cache_path: ".clawsmith/machine-profile.json"
  gpu_detection_timeout: 10    # seconds
  storage_min_free_gb: 20      # warn if less than this

recommendation:
  default_intent: coding
  prefer_quantized: true
  max_model_size_gb: 50
  prefer_runtime: ollama

install:
  default_model_path: null     # null = auto-detect best disk
  ollama_auto_pull: true
  verify_checksums: true
  max_concurrent_downloads: 1

memory:
  workspace_root: "."
  auto_sync_on_detect: true
  memory_dir: "memory"
  clawsmith_dir: "clawsmith"

scope:
  default_allow_multi_repo: false
  default_read_only_external: true
  contracts_dir: ".clawsmith/scopes"

mutation:
  self_mutation_enabled: false
  require_approval: true
  require_validation: true
  require_staging: true
  max_affected_files: 20
  staging_dir: ".clawsmith/staging"
  backups_dir: ".clawsmith/backups"
  audit_log: ".clawsmith/mutation-audit.json"
